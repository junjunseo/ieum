name: 버그 수정
description: 잘못된 동작, 테스트 실패, 예외 상황을 수정합니다.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 설명
      description: 어떤 동작이 잘못되었는지 적어주세요.
      placeholder: 예) 특정 계층 선언에서 위반이 감지되지 않는다.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 문제를 재현하는 명령이나 입력 파일을 적어주세요.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 원래 어떤 결과가 나와야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제 출력, 오류 메시지, 종료 코드를 적어주세요.
    validations:
      required: true

  - type: textarea
    id: test
    attributes:
      label: 확인한 테스트
      description: 문제 확인 또는 수정 검증에 사용한 테스트를 적어주세요.
      placeholder: 예) powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\test.ps1
    validations:
      required: false
