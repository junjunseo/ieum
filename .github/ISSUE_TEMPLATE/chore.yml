name: 관리 작업
description: 빌드, 설정, GitHub 템플릿, 스크립트 등 저장소 관리 작업을 처리합니다.
title: "chore: "
labels: ["chore"]
body:
  - type: textarea
    id: purpose
    attributes:
      label: 작업 목적
      description: 이 관리 작업이 필요한 이유를 적어주세요.
      placeholder: 예) 이슈 작성 흐름을 표준화하기 위해 GitHub 이슈 템플릿을 추가한다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 이번 이슈에서 처리할 항목을 체크리스트로 적어주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 이 이슈를 완료로 볼 수 있나요?
      value: |
        - [ ] 설정 또는 스크립트 변경 완료
        - [ ] 필요한 경우 동작 확인
        - [ ] 변경 사항 설명 가능
    validations:
      required: true

  - type: textarea
    id: test
    attributes:
      label: 확인 방법
      description: 실행한 명령이나 수동 확인 방법을 적어주세요.
      placeholder: 예) GitHub Issues 화면에서 템플릿 노출 확인
    validations:
      required: false
